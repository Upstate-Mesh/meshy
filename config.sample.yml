---
save_node_db: true
serial_port: /dev/ttyACM0
# tcp:  # If set, TCP takes precedence over serial_port
#   host: 192.168.1.100
#   port: 4000
send_delay: 2
weather:
  conditions:
    humidity_entity_id: sensor.outdoor_humidity
    location_description: City of Poets, Hyperion
    temp_entity_id: sensor.outdoor_temperature
    url: http://homeassistant.local:8123
  forecast:
    url: https://api.weather.gov/gridpoints/ALY/72,63/forecast
    user_agent: (example.com, example@example.com)
nixle:
  url: https://nixle.us/city/your-state/your-city/
ny511:
  api_key: your-511ny-api-key
  area: Albany  # Only track alerts where AreaNames contains this value (case-insensitive)
  prefix: '511 Alert:'  # Prepended to each message; leave empty to omit
adsb:
  url: http://localhost:8080
  max_age_seconds: 60
  max_count: 5
  home_lat: 0.0
  home_lon: 0.0
bot:
  active: true
  auto_accept_contacts: true
  commands:
    .about: I'm a MeshCore bot 🤖
    .aircraft: get_aircraft
    .alerts: get_alerts
    .conditions: get_weather_conditions
    .hf: get_hf_conditions
    .help: 'Available commands: .about .aircraft .alerts .conditions .hf .help .ping
      .seen .wx'
    .ping: pong!
    .seen: get_seen_nodes
    .wx: get_weather_forecast
channel_commands:
  - channel: '#adsb'
    command: .aircraft
    dispatch: get_aircraft
    cooldown_seconds: 300
  - channel: '#weather'
    command: .conditions
    dispatch: get_weather_conditions
    cooldown_seconds: 300
workers:
  - type: advert
    active: true
    cron: 0 * * * *
    dispatch: get_advert_worker
    flood: false
  - type: advert
    active: true
    cron: 0 */6 * * *
    dispatch: get_advert_worker
    flood: true
  - type: beacon
    active: true
    channel: public
    cron: 0 0,12 * * *
    dispatch: get_beacon_worker
    text: Come join our local Discord! https://www.example.com
  - type: weather_conditions
    active: false
    channel: public
    cron: 0 * * * *
    dispatch: get_weather_conditions_worker
  - type: weather_forecast
    active: true
    channel: public
    cron: 15 8,20 * * *
    dispatch: get_weather_forecast_worker
  - type: aircraft
    active: false
    channel: public
    cron: 0 * * * *
    dispatch: get_aircraft_worker
  - type: nixle
    active: false
    channel: public
    cron: 0 * * * *
    dispatch: get_nixle_worker
  - type: hf_conditions
    active: false
    channel: public
    cron: 0 */6 * * *
    dispatch: get_hf_worker
  - type: ny511
    active: false
    channel: public
    cron: 0 * * * *
    dispatch: get_ny511_worker
